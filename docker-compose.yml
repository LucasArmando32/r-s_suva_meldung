services:
  suva-anmeldung:
    build: .
    container_name: rs-suva-anmeldung
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    volumes:
      # Generierte Dokumente persistieren
      - ./generated:/app/generated
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
